# --- Nginx Virtual Host Configuration Sample for VPS Deployment ---
# Save this file to /etc/nginx/sites-available/talent-mind and symlink it to sites-enabled.

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Redirect HTTP to HTTPS (uncomment after installing Let's Encrypt SSL)
    # return 301 https://$host$request_uri;

    # Frontend React Static Files
    location / {
        root /var/www/talent-mind/frontend/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Django Collected Static Files (Admin assets, REST framework UI)
    location /static/ {
        alias /var/www/talent-mind/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Proxy Django API and Admin Requests to Gunicorn
    location ~ ^/(api|admin) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Long timeout for FAISS search / LLM operations
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
    }
}
