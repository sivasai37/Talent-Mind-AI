services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-hiregenius-dev-secret-key-CHANGE-ME-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      USE_POSTGRES: ${USE_POSTGRES:-false}
      DATABASE_URL: ${DATABASE_URL:-}
    volumes:
      - ./embeddings:/app/embeddings
      - ./faiss_index:/app/faiss_index
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=${VITE_API_BASE:-http://localhost:8000/api}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
