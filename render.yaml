services:
  # 1. Django Backend Web Service (Docker container)
  - type: web
    name: talent-mind-backend
    runtime: docker
    dockerfilePath: Dockerfile
    plan: starter
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: talent-mind-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://talent-mind-frontend.onrender.com" # Replace with your actual frontend URL after deployment
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: GEMINI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: HF_TOKEN
        sync: false # Set manually in Render dashboard
      - key: SECURE_SSL_REDIRECT
        value: "True"

  # 2. React Frontend (Served as a high-performance CDN Static Site)
  - type: web
    name: talent-mind-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    plan: free
    envVars:
      - key: VITE_API_BASE
        value: "https://talent-mind-backend.onrender.com/api" # Replace with your actual backend service URL

databases:
  - name: talent-mind-db
    plan: flexible
